name: Validate Feature Branch

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Schema check (migration files cover all collections)
        run: node scripts/schema-check.mjs

      - name: TypeScript check
        run: npx tsc --noEmit
